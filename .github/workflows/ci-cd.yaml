name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  HELM_REPO: collegeproduce/helm-charts
  CHART_PATH_PROD: prod-cluster/collegeproduce-landing-page
  CHART_PATH_DEV: dev-cluster/collegeproduce-landing-page

jobs:
  # ============================================
  # Job 1: Lint & Test
  # ============================================
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm run test:ci

  # ============================================
  # Job 2: Build & Push Docker Image
  # ============================================
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      sha-tag: ${{ steps.vars.outputs.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: |
          echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.meta.outputs.digest }}"

  # ============================================
  # Job 3: Security Scan
  # ============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: read

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.sha-tag }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.sha-tag }}
          format: "table"
          exit-code: "1"
          severity: "CRITICAL"
          ignore-unfixed: true

  # ============================================
  # Job 4: Deploy to Development (dev branch)
  # ============================================
  update-helm-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'

    environment: ${{ 'development' }}

    steps:
      - name: Checkout Helm Charts Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HELM_REPO }}
          token: ${{ secrets.HELM_PAT }}
          ref: main
          path: helm-charts

      - name: Get image tag
        id: image-tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Update values.yaml
        run: |
          cd helm-charts/${{ env.CHART_PATH_DEV }}

          # Update image repository and tag
          yq eval '.image.repository = "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"' -i values.yaml
          yq eval '.image.tag = "${{ steps.image-tag.outputs.sha }}"' -i values.yaml

          echo "Updated values.yaml:"
          cat values.yaml | grep -A 5 "^image:"

      - name: Update Chart.yaml appVersion
        run: |
          cd helm-charts/${{ env.CHART_PATH_DEV }}

          # Update appVersion with the commit SHA
          yq eval '.appVersion = "${{ steps.image-tag.outputs.sha }}"' -i Chart.yaml

          echo "Updated Chart.yaml:"
          cat Chart.yaml

      - name: Commit and Push changes
        run: |
          cd helm-charts
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore(dev): update ${{ env.CHART_PATH_DEV }} image to ${{ steps.image-tag.outputs.sha }}"
          git push origin main

  # ============================================
  # Job 5: Deploy to Production (main branch, approval required)
  # ============================================
  update-helm-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment: ${{ 'production' }}

    steps:
      - name: Checkout Helm Charts Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HELM_REPO }}
          token: ${{ secrets.HELM_PAT }}
          ref: main
          path: helm-charts

      - name: Get image tag
        id: image-tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Update values.yaml
        run: |
          cd helm-charts/${{ env.CHART_PATH_PROD }}

          # Update image repository and tag
          yq eval '.image.repository = "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"' -i values.yaml
          yq eval '.image.tag = "${{ steps.image-tag.outputs.sha }}"' -i values.yaml

          echo "Updated values.yaml:"
          cat values.yaml | grep -A 5 "^image:"

      - name: Update Chart.yaml appVersion
        run: |
          cd helm-charts/${{ env.CHART_PATH_PROD }}

          # Update appVersion with the commit SHA
          yq eval '.appVersion = "${{ steps.image-tag.outputs.sha }}"' -i Chart.yaml

          echo "Updated Chart.yaml:"
          cat Chart.yaml

      - name: Commit and Push changes
        run: |
          cd helm-charts
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore(prod): update ${{ env.CHART_PATH_PROD }} image to ${{ steps.image-tag.outputs.sha }}"
          git push origin main
